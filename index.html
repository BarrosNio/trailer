<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Tabuleiro do Multiverso - Trailer Oficial</title>

    <meta property="og:type" content="video.movie">
    <meta property="og:title" content="O Tabuleiro do Multiverso - Assista ao Trailer Oficial">
    <meta property="og:description" content="Estreia em breve: Maio de 2026. Uma batalha épica pelo código final.">
    <meta property="og:url" content="https://barrosnio.github.io/trailer/">
    <meta property="og:image" content="poster-limpo.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="1200">

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; display: flex; justify-content: center;
            align-items: center; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #fff;
        }

        /* CONTAINER DO CARTAZ */
        .poster-container {
            position: relative;
            width: 90vw;
            height: 90vh;
            max-width: 800px;
            display: grid;
            grid-template-rows: auto 1fr auto 80px;
            justify-items: center;
            gap: 15px;
            background-image: url(Gemini_Generated_Image_l0dg4ul0dg4ul0dg.png);
            background-size: cover;
            background-position: center;
            border: 2px solid #333;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            padding: 20px;
        }

        .poster-title img { width: 80%; max-width: 500px; height: auto; }

        /* MOLDURA E VÍDEO */
        .frame-section {
            display: flex; justify-content: center; align-items: center;
            width: 95%; height: 100%;
            background-image: url('moldura-vazia.png');
            background-size: contain; background-repeat: no-repeat; background-position: center;
        }

        .video-player {
            width: 78%; 
            height: 40%; 
            background-color: #000;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        /* PERSONAGENS */
        .characters-section {
            width: 100%; display: flex; justify-content: space-around;
            align-items: flex-end; margin-top: -100px;
        }
        .characters-section img { height: auto; max-width: 45%; }
        .capitao-america { margin-left: -50px; }
        .marcus-img { margin-right: -50px; }

        /* RODAPÉ FAMÍLIA BARROS */
        .poster-footer {
            grid-row: 4; text-align: center; font-size: 0.8rem; color: #ccc;
            width: 100%; padding-top: 10px; text-transform: uppercase; letter-spacing: 1px;
        }
        .poster-footer span {
            display: block; margin-top: 8px; color: #fff;
            font-weight: bold; font-size: 0.95rem;
        }

        @media (max-width: 600px) {
            .poster-container { grid-template-rows: auto 1fr auto 100px; }
            .characters-section { margin-top: -60px; }
            .video-player { width: 75%; height: 38%; }
        }
    </style>
</head>

<body>

    <div class="poster-container">
        <div class="poster-title">
         
        </div>

        <div class="frame-section">
            <video class="video-player" controls playsinline poster="poster-limpo.jpg">
                <source src="https://www.dropbox.com/scl/fi/c0ii25kprhyzvjv6pz6xu/0307.mp4?rlkey=tcny53tbuibzhzuh4r716d4je&st=pf12piw1&raw=1" type="video/mp4">
                Seu navegador não suporta vídeos.
            </video>
        </div>

        <div class="characters-section">
            <img src="capitao.png" alt="Capitão América" class="capitao-america">
            
        </div>

        <div class="poster-footer">
            VORTEX STUDIOS • EXCRIMO • FAMILIA BARROS STUDIOS • GIMTEIAS ANE<br>
            EM BREVE • MAIO DE 2026<br>
            <span>UM FILME EXCLUSIVO DA FAMÍLIA BARROS</span>
        </div>
    </div>

</body>

</html>
